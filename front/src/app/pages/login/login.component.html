<div class="login-wrapper">
  <div class="login-left">
    <mat-icon class="hero-icon">storefront</mat-icon>
    <h1 class="hero-title">ShopCore</h1>
    <p class="hero-sub">Your curated marketplace.<br>Discover, buy, and track — all in one place.</p>
  </div>

  <mat-card class="login-card">
    <div class="card-logo">
      <mat-icon>shopping_bag</mat-icon>
    </div>
    <mat-card-header>
      <mat-card-title>Welcome back</mat-card-title>
      <mat-card-subtitle>Sign in to continue shopping</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <mat-icon matPrefix>email</mat-icon>
          <input matInput type="email" formControlName="email" autocomplete="email" />
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <mat-icon matPrefix>lock</mat-icon>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
        </mat-form-field>

        @if (error()) {
          <div class="error-msg">
            <mat-icon>error_outline</mat-icon>
            <span>{{ error() }}</span>
          </div>
        }

        <button mat-flat-button type="submit" class="submit-btn" [disabled]="loading()">
          @if (loading()) {
            <mat-spinner diameter="20" />
          } @else {
            Sign In
          }
        </button>
      </form>

      <p class="hint">Use <strong>user&#64;shopcore.dev</strong> / <strong>password123</strong></p>
    </mat-card-content>
  </mat-card>
</div>
